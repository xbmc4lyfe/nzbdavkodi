name: Semgrep

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '25 13 * * 1'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  semgrep:
    permissions:
      contents: read
      security-events: write
      actions: read
    name: Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Both returntocorp/semgrep-action and semgrep/semgrep-action are
    # archived ("Use https://github.com/semgrep/semgrep instead"), so we
    # run the official Semgrep CLI from its Docker image directly. Pinned
    # by manifest-list digest — sha256 is immutable, unlike a moving tag.
    # Bump manually (or via Dependabot if it adds container-image support
    # to the github-actions ecosystem) by querying Docker Hub for the
    # current `latest` tag's digest.
    container:
      image: semgrep/semgrep@sha256:7810f1d7884974ab6dda7bef8f4a2c8e165ea2142fd8260515d380e4f1407263 # 1.160.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Semgrep
        # `semgrep ci` requires SEMGREP_APP_TOKEN (Semgrep AppSec
        # Platform login). This repo has no such token, so we use
        # `semgrep scan --config auto` to pull the community default
        # ruleset from the public registry — same behaviour the old
        # action provided when its publishToken was unset.
        run: semgrep scan --config auto --sarif --output=semgrep.sarif

      - name: Drop in-source suppressed Semgrep results
        # Semgrep SARIF includes `# nosemgrep` findings as suppressed
        # results. GitHub code scanning still displays them, so remove
        # those results before upload and treat the source suppression as
        # authoritative.
        run: |
          python3 - <<'PY'
          import json

          path = "semgrep.sarif"
          with open(path, encoding="utf-8") as f:
              sarif = json.load(f)

          removed = 0
          for run in sarif.get("runs", []):
              results = run.get("results", [])
              kept = [r for r in results if not r.get("suppressions")]
              removed += len(results) - len(kept)
              run["results"] = kept

          with open(path, "w", encoding="utf-8") as f:
              json.dump(sarif, f)

          print("Removed {} suppressed Semgrep SARIF result(s).".format(removed))
          PY

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4
        with:
          sarif_file: semgrep.sarif
        if: always()
