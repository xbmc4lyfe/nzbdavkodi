name: 'Dependency review'

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          comment-summary-in-pr: ${{ github.event_name == 'pull_request' && 'always' || 'never' }}
          base-ref: ${{ github.event_name == 'workflow_dispatch' && github.event.repository.default_branch || '' }}
          head-ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || '' }}
