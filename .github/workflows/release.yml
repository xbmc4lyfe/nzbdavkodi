name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify addon.xml version matches tag
        run: |
          xml_version=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('plugin.video.nzbdav/addon.xml')
          print(tree.getroot().get('version'))
          ")
          if [ "$xml_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "ERROR: addon.xml version ($xml_version) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Build addon zip
        run: python3 scripts/build_zip.py

      - name: Generate repository metadata
        run: python3 scripts/generate_repo.py --output-dir dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: plugin.video.nzbdav.zip
          generate_release_notes: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: false
