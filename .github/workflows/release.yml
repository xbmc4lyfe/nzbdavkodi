name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify addon.xml version matches tag
        run: |
          xml_version=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('plugin.video.nzbdav/addon.xml')
          print(tree.getroot().get('version'))
          ")
          if [ "$xml_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "ERROR: addon.xml version ($xml_version) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Build addon zip
        run: python3 scripts/build_zip.py

      - name: Generate repository metadata
        run: python3 scripts/generate_repo.py --output-dir dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: plugin.video.nzbdav.zip
          generate_release_notes: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./dist

  deploy-pages:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
