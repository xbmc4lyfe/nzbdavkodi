name: Codacy Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '44 23 * * 0'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  codacy-security-scan:
    permissions:
      contents: read
      security-events: write
      actions: read
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@d840f886c4bd4edc059706d09c6a1586111c540b
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647

      - name: Filter SARIF (remove test/vendor noise)
        run: |
          python3 -c "
          import json
          with open('results.sarif') as f:
              sarif = json.load(f)
          exclude_prefix = ('tests/', 'plugin.video.nzbdav/resources/lib/ptt/', 'scripts/')
          exclude_suffix = ('.md',)
          def should_exclude(uri):
              return any(uri.startswith(p) for p in exclude_prefix) or any(uri.endswith(s) for s in exclude_suffix)
          for run in sarif.get('runs', []):
              run['results'] = [
                  r for r in run.get('results', [])
                  if not any(
                      should_exclude(loc.get('physicalLocation', {}).get('artifactLocation', {}).get('uri', ''))
                      for loc in r.get('locations', [])
                  )
              ]
          with open('filtered.sarif', 'w') as f:
              json.dump(sarif, f)
          "

      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@d4b3ca9fa7f69d38bfcd667bdc45bc373d16277e # v4
        with:
          sarif_file: filtered.sarif
        if: always()
